<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #14110d;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }
  /* faint gold phosphor glow behind the title */
  .glow {
    position: absolute; top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    width: 900px; height: 430px;
    background: radial-gradient(ellipse, rgba(212,165,49,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .card {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 80px;
  }
  .card::before, .card::after {
    content: ''; position: absolute; left: 60px; right: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, #d4a531, transparent);
  }
  .card::before { top: 30px; }
  .card::after  { bottom: 30px; }
  .bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #d4a531; }
  .lab-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; letter-spacing: 0.24em; color: #b3a888;
    text-transform: uppercase; margin-bottom: 24px;
  }
  .name {
    font-size: 124px; font-weight: 600; letter-spacing: 0.04em;
    color: #d4a531; line-height: 1; margin-bottom: 22px;
    text-shadow: 0 0 80px rgba(212,165,49,0.30), 0 0 26px rgba(212,165,49,0.16);
  }
  .divider { display: flex; align-items: center; gap: 16px; width: 760px; margin-bottom: 24px; }
  .div-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #8a6d2a); }
  .div-line:last-child { background: linear-gradient(90deg, #8a6d2a, transparent); }
  .div-mark {
    font-family: 'IBM Plex Mono', monospace;
    color: #d4a531; font-size: 13px; letter-spacing: 0.14em; white-space: nowrap;
  }
  .epithet {
    font-size: 26px; color: #e9e0cd; font-style: italic;
    margin-bottom: 32px; text-align: center; max-width: 860px; line-height: 1.35;
  }
  .tags { display: flex; gap: 14px; }
  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; color: #d4a531; border: 1px solid rgba(212,165,49,0.34);
    padding: 5px 15px; letter-spacing: 0.08em; text-transform: uppercase;
    background: rgba(212,165,49,0.04);
  }
  .seal {
    position: absolute; bottom: 46px; left: 50%; transform: translateX(-50%);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; letter-spacing: 0.32em; color: #8a6d2a;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="bar"></div>
  <div class="card">
    <div class="lab-tag">The Elect &mdash; Voice Lab</div>
    <div class="name">JAN VAN LEIDEN</div>
    <div class="divider">
      <span class="div-line"></span>
      <span class="div-mark">M&Uuml;NSTER &middot; NEW JERUSALEM &middot; 1534&ndash;35</span>
      <span class="div-line"></span>
    </div>
    <div class="epithet">The voice of Jan van Leiden&rsquo;s apocalyptic kingdom. It proclaims; it does not reassure.</div>
    <div class="tags">
      <span class="tag">Qwen2.5-7B</span>
      <span class="tag">Local Ollama</span>
      <span class="tag">CC-BY-NC-4.0</span>
    </div>
    <div class="seal">THE GODLY REMNANT</div>
  </div>
</body>
</html>
